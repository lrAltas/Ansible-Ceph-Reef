---
- name: Install Ceph release packages
  block:
    - name: 检查本地仓库标记文件是否存在
      ansible.builtin.stat:
        path: "{{ env_init_local_repository_mark_file_path }}"
      register: env_init_local_repo_mark

    - name: Install Ceph and related packages
      ansible.builtin.dnf:
        name: "{{ env_init_ceph_release_packages }}"
        state: present
      when: not env_init_local_repo_mark.stat.exists

- name: Install Cephadm and Podman
  ansible.builtin.dnf:
    name: "{{ env_init_cephadm_packages }}"
    state: present

- name: Install Ceph-common package
  ansible.builtin.dnf:
    name: "{{ env_init_cephcommon_packages }}"
    state: present
