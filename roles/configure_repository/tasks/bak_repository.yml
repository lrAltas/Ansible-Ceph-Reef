---
- name: 备份原有 /etc/yum.repos.d 文件夹（带日期时间戳）
  community.general.archive:
    path: /etc/yum.repos.d/
    dest: "/etc/yum.repos.d.backup-{{ ansible_date_time.date }}_{{ ansible_date_time.hour }}{{ ansible_date_time.minute }}.tar.gz"
    format: gz
    mode: '0644'
  when: ansible_os_family == 'RedHat'
  changed_when: false
