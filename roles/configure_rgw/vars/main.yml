---
# vars file for roles/configure_rgw
configure_rgw_mark_dir_path: "/root/.mark"
configure_rgw_mark_files_path:
  configure_rgw_leader_success: "{{ configure_rgw_mark_dir_path }}/configure_rgw_leader_success.mark"
  configure_rgw_followers_success: "{{ configure_rgw_mark_dir_path }}/configure_rgw_followers_success.mark"

configure_rgw_packages:
  - ceph-radosgw

configure_rgw_rgw_keyring_files_path:
  rgw_keyring: "/etc/ceph/ceph.client.radosgw.keyring"

configure_rgw_ceph_conf_path: "/etc/ceph/ceph.conf"
configure_rgw_role_files_path:
  ceph_conf: "/home/lraltas/project/code_project/Ansible-Ceph-Reef/roles/configure_rgw/files/ceph.conf"
  rgw_keyring: "/home/lraltas/project/code_project/Ansible-Ceph-Reef/roles/configure_rgw/files/ceph.client.radosgw.keyring"

configure_rgw_log_file_dir_path: "/var/log/radosgw"
